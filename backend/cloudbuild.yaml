steps:
  # 0단계: 프론트엔드(Next.js) 정적 export 빌드 → backend/static/ 로 복사 (통합 오리진 배포)
  # NEXT_PUBLIC_API_URL을 빈 문자열로 주입하면 API 호출이 상대경로로 빌드되어
  # 같은 오리진(백엔드가 서빙하는 도메인)을 그대로 사용하게 된다.
  - name: 'node:20'
    dir: 'frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        npm ci
        NEXT_PUBLIC_API_URL= npm run build
        cp -r out ../backend/static

  # 1단계: backend/Dockerfile을 사용하여 모노레포 내 backend 컨텍스트로 이미지 빌드
  # (0단계에서 만든 backend/static/이 Dockerfile의 COPY . . 에 포함되어 이미지에 들어간다)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/vision-rag-backend:$COMMIT_SHA', '.']
    dir: 'backend'

  # 2단계: 빌드된 컨테이너 이미지를 구글 컨테이너 레지스트리에 푸시
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vision-rag-backend:$COMMIT_SHA']

  # 3단계: Cloud Run에 새 revision으로 자동 배포 (CORS 및 API Key 환경변수 포함)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'vision-rag-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/vision-rag-backend:$COMMIT_SHA'
      - '--region'
      - 'asia-northeast3'
      - '--allow-unauthenticated'
      - '--set-env-vars=^##^GEMINI_API_KEY=$_GEMINI_API_KEY##ALLOWED_ORIGINS=http://localhost:8374##GOOGLE_CLIENT_ID=$_GOOGLE_CLIENT_ID##JWT_SECRET=$_JWT_SECRET##CLOUD_TASKS_QUEUE=$_CLOUD_TASKS_QUEUE##CLOUD_RUN_URL=$_CLOUD_RUN_URL##INTERNAL_TASK_SECRET=$_INTERNAL_TASK_SECRET'
      - '--cpu=2'
      - '--memory=2Gi'
      - '--min-instances=0'
      # 비용 상한선. 이제껏 서비스에만 설정돼 있고 IaC에는 없어 드리프트 상태였다.
      # 명시하지 않으면 재배포 시 Cloud Run 기본값(100)으로 열릴 위험이 있다.
      - '--max-instances=20'
      - '--concurrency=8'
      - '--timeout=900'
      - '--cpu-throttling'

# 프론트 빌드 단계 추가로 빌드 시간이 늘어나 기본 10분 제한에 걸릴 수 있어 여유 있게 설정
timeout: '1800s'

options:
  logging: CLOUD_LOGGING_ONLY
